name: Deploy to Oracle Cloud

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (commit SHA, branch, or tag). Defaults to latest master."
        required: false
        default: "master"

env:
  VM_USER: opc

jobs:
  deploy:
    name: Deploy Server
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.ORACLE_VM_IP }} >> ~/.ssh/known_hosts

      - name: Write env to VM
        run: |
          ssh ${{ env.VM_USER }}@${{ secrets.ORACLE_VM_IP }} "cat > ~/sogrim/packages/server/.env" << 'ENVFILE'
          SOGRIM_URI="${{ secrets.MONGO_URI_DEV }}"
          SOGRIM_CLIENT_ID="${{ secrets.CLIENT_ID }}"
          SOGRIM_PORT="5545"
          SOGRIM_PROFILE="release"
          SOGRIM_CACHE_DIR="/home/opc/cache"
          SOGRIM_STATIC_DIR="/home/opc/sogrim/packages/sogrim-app-v2/dist"
          ENVFILE

      - name: Deploy to VM
        run: |
          REF="${{ github.event.inputs.ref || 'master' }}"
          ssh ${{ env.VM_USER }}@${{ secrets.ORACLE_VM_IP }} bash -s "$REF" << 'DEPLOY'
          set -euo pipefail
          REF="$1"

          cd ~/sogrim

          # Fetch and hard-reset to the requested ref, discarding any local changes
          git fetch origin
          git reset --hard "origin/$REF"

          echo "Deploying $(git log --oneline -1)"

          # Source env vars (needed for SOGRIM_CLIENT_ID during frontend build)
          set -a
          source packages/server/.env
          set +a

          # Build frontend
          export VITE_GOOGLE_CLIENT_ID="$SOGRIM_CLIENT_ID"
          export VITE_API_URL="/api"
          cd packages/sogrim-app-v2
          ~/.bun/bin/bun install --frozen-lockfile
          ~/.bun/bin/bun run build
          cd ../..

          # Rebuild server
          source ~/.cargo/env
          cd packages/server
          cargo build --release

          # Restart the service
          sudo systemctl restart sogrim

          # Wait for healthcheck
          for i in 1 2 3 4 5 6; do
            if curl -sf http://localhost:5545/healthcheck; then
              echo ""
              echo "Deploy successful!"
              exit 0
            fi
            sleep 5
          done

          echo "Healthcheck failed after deploy"
          sudo journalctl -u sogrim --no-pager -n 20
          exit 1
          DEPLOY

      - name: Verify HTTPS endpoint
        run: |
          curl -sf https://sogrim.duckdns.org/healthcheck
          echo "HTTPS endpoint healthy"
