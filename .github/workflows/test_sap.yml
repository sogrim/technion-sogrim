name: Test SAP Connectivity
on:
  push:
    branches:
      - feature/oracle-infra-and-deploy
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test Technion SAP reachability
        run: |
          echo "=== Testing portalex.technion.ac.il ==="
          curl -sv --max-time 15 -o response.json -w "\nHTTP_CODE: %{http_code}\n" \
            "https://portalex.technion.ac.il/sap/opu/odata/sap/Z_CM_EV_CDIR_DATA_SRV/SemesterSet?\$select=PiqYear,PiqSession&sap-client=700" \
            -H "Accept: application/json" \
            -H "User-Agent: Mozilla/5.0" || true
          echo "=== Response (first 500 chars) ==="
          head -c 500 response.json 2>/dev/null || echo "no response"
