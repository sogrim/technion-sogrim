on:
  merge_group:
  pull_request:
    branches:
      - master

name: Server-CI

env:
  CARGO_TERM_COLOR: always
  IP: "0.0.0.0"
  PORT: ${{secrets.PORT}}
  URI: ${{secrets.MONGO_URI_DEV}}
  CLIENT_ID: ${{secrets.CLIENT_ID}}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'packages/server/**'

  test:
    name: Run Tests
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      - uses: actions-rs/cargo@v1
        with:
          command: test
          args: --manifest-path packages/server/Cargo.toml

  format:
    name: Format
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          components: rustfmt
      - uses: actions-rs/cargo@v1
        with:
          command: fmt
          args: --manifest-path packages/server/Cargo.toml --all -- --check

  clippy:
    name: Clippy
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          components: clippy
      - uses: actions-rs/cargo@v1
        with:
          command: clippy
          args: --manifest-path packages/server/Cargo.toml --all-targets -- -D warnings

  # Gate: always runs, fails if any real job failed. Required by branch protection.
  ci-pass:
    name: CI Pass
    needs: [test, format, clippy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [ "${{ needs.test.result }}" = "failure" ] || \
             [ "${{ needs.format.result }}" = "failure" ] || \
             [ "${{ needs.clippy.result }}" = "failure" ] || \
             [ "${{ needs.test.result }}" = "cancelled" ] || \
             [ "${{ needs.format.result }}" = "cancelled" ] || \
             [ "${{ needs.clippy.result }}" = "cancelled" ]; then
            exit 1
          fi
