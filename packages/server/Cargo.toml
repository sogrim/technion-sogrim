[package]
name = "sogrim-server"
version = "1.4.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
name = "sogrim_server"
path = "src/lib.rs"

[[bin]]
name = "sogrim-server"
path = "src/main.rs"

[[bin]]
name = "sogrim"
path = "src/bin/sogrim.rs"

[dependencies]
anyhow = "1"
dotenvy = "0.15"
log = "0.4.29"
colored = "3.1"
mongodb = { version = "3.5", default-features = false, features = ["bson-3", "compat-3-3-0", "rustls-tls", "dns-resolver"] }
bson = { version = "3.1", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.43", features = ["rt-multi-thread", "macros", "net", "time", "sync"] }
axum = "0.8"
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "fs", "trace"] }
http = "1"
futures-util = "0.3.32"
jsonwebtoken = { version = "10.3", features = ["aws_lc_rs"] }
env_logger = "0.11.10"
petgraph = "0.8.3"
regex = "1.12"
reqwest = { version = "0.13", features = ["json"] }
chrono = "0.4.44"
clap = { version = "4.6", features = ["derive", "env"] }
moka = { version = "0.12", features = ["future"] }
urlencoding = "2"
atty = "0.2"
ctrlc = "3.5"

[dev-dependencies]
base64 = "0.22"
rand = "0.10"
rsa = "0.10.0-rc.17"
